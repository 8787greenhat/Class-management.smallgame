<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育專業知識大戳戳樂</title>
    <style>
        :root {
            --bg-color: #F0F2F5;
            --primary-blue: #BBDEFB;
            --accent-red: #E53935;
            --grid-yellow: #FFF9C4;
            --grid-green: #C8E6C9;
            --grid-blue: #90CAF9;
            --grid-pink: #F8BBD0;
            --poked-gray: #E0E0E0;
        }

        body {
            font-family: "PingFang TC", "Heiti TC", "微軟正黑體", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            -webkit-user-select: none;
        }

        h1 { color: #2C3E50; font-size: 1.4rem; text-align: center; margin-bottom: 10px; }

        #score-board {
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-red);
            margin-bottom: 20px;
            border: 2px solid #FFCDD2;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px;
            width: 100%;
            max-width: 650px;
        }

        .poke-item {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            padding: 5px;
            transition: transform 0.1s;
            word-break: break-all;
        }

        .poke-item:active { transform: scale(0.95); }
        .poked { background-color: var(--poked-gray) !important; color: #757575 !important; box-shadow: none !important; cursor: default; }

        @media (max-width: 500px) {
            .grid-container { gap: 5px; }
            .poke-item { font-size: 0.65rem; padding: 2px; }
        }
    </style>
</head>
<body>

    <h1>🎓 教育專業知識戳戳樂</h1>
    <div id="score-board">當前得分：<span id="score">0</span></div>

    <div class="grid-container" id="grid"></div>

    <script>
        const rawData = [
            // 1. 基本理念
            {id: "1O1", q: "【1O1】林老師在進行「浮力」教學時，先讓學生分享在游泳池中感受到的漂浮經驗（如：身體變輕、水有推力），接著引導學生觀察實驗數據，並歸納出「阿基米德原理」的公式與定義。\n\n林老師引導學生將游泳的『漂浮經驗』歸納為『學術公式』。這屬於哪種知識移轉？\n(選項：A.外顯→外顯 B.隱性→外顯 C.外顯→隱性 D.隱性→隱性)", a: "B", type: "概述"},
            {id: "1M1", q: "【1M1】曉明班上秩序混亂，他決定不只是針對個別愛講話的同學處分，而是去觀察『座位安排』、『同儕文化』與『課堂節奏』之間如何互相牽動，並從結構整體改善。這屬於？\n(A.自我超越 B.改善心智模式 C.建立共同願景 D.團隊學習 E.系統思考)", a: "E", type: "神秘格子"},
            {id: "1M2", q: "【1M2】林老師在日誌寫道：『我發現自己過去總認為後段班學生就是沒動機，這讓我忽略了他們的表現。我必須放下這個老舊框架，重新看待學生。』這屬於？\n(A.自我超越 B.改善心智模式 C.建立共同願景 D.團隊學習 E.系統思考)", a: "B", type: "神秘格子"},
            {id: "1M3", q: "【1M3】導師帶領幹部進行會談，要求每個人先暫時擱置自己的意見，真誠傾聽他人聲音，讓全體幹部的思維能像匯流河水般共同思考、深度對話。這屬於？\n(A.自我超越 B.改善心智模式 C.建立共同願景 D.團隊學習 E.系統思考)", a: "D", type: "神秘格子"},
            {id: "1M4", q: "【1M4】班會課時，王老師不直接宣布班規，而是引導學生共同想像：『一年後，我們希望看到教室裡是什麼樣的風景？』，激發學生自發努力。這屬於？\n(A.自我超越 B.改善心智模式 C.建立共同願景 D.團隊學習 E.系統思考)", a: "C", type: "神秘格子"},
            {id: "1M5", q: "【1M5】國三小強對未來迷惘，導師引導他釐清『目前的學業程度』與『成為工程師的夢想』之間的差距，利用這種張力激發他內在追求卓越的動力。這屬於？\n(A.自我超越 B.改善心智模式 C.建立共同願景 D.團隊學習 E.系統思考)", a: "A", type: "神秘格子"},
            {id: "1S1", q: "【1S1】某校社群老師入班紀錄學生學習歷程、針對領綱進行整合教案設計、並於課後針對評量結果進行深度討論。請問這依序體現了教學三部曲的哪些階段？\n\n(答案格式：1共同備課、2公開觀課、3集體議課)［排序］", a: "213", type: "小節"},
            
            // 2. 意涵－特徵
            {id: "2O1", q: "【2O1】九年一班排球隊發揮『整體大於部分總和』的戰力(1)；但科展小組卻因爭奪獎勵出現『我贏即你輸』的衝突(2)。老師引導學生建立『榮辱與共』的連結(3)，並強調課室應具備互相支持的向心力(4)。\n\n請問 (1)(2)(3)(4) 依序對應哪些概念？\n(答案格式：完形心理學、學習共同體、正向互賴、負向互賴)", a: "完形心理學、負向互賴、正向互賴、學習共同體", type: "概述"},
            {id: "2M1", q: "【2M1】老師為程度落後的小明設計專屬的目標，不比排名，而是紀錄他每天背3個單字的進步，鼓勵他挑戰自我的卓越。這體現了？\n(A.班級共同遠景的建立 B.師生心智模式的改善 C.自我超越行為的促發 D.師生學習責任的分享 E.教育行動的實踐 F.教師做為班級領導人)", a: "C", type: "神秘格子"},
            {id: "2M2", q: "【2M2】面對網路霸凌問題，老師找尋社群『諍友』共同反思治本策略，將解決問題視為自己專業成長的過程。這體現了？\n(A.班級共同遠景的建立 B.師生心智模式的改善 C.自我超越行為的促發 D.師生學習責任的分享 E.教育行動的實踐 F.教師做為班級領導人)", a: "E", type: "神秘格子"},
            {id: "2M3", q: "【2M3】園遊會籌備時，老師引導學生共同分配任務與負擔學習成效。當出現失誤時，學生自發檢討而非推諉給老師。這體現了？\n(A.班級共同遠景的建立 B.師生心智模式的改善 C.自我超越行為的促發 D.師生學習責任的分享 E.教育行動的實踐 F.教師做為班級領導人)", a: "D", type: "神秘格子"},
            {id: "2M4", q: "【2M4】開學週老師不直接宣佈班規，而是引導學生共同繪製班級地圖，由下而上策定出大家的共有願景。這體現了？\n(A.班級共同遠景的建立 B.師生心智模式的改善 C.自我超越行為的促發 D.師生學習責任的分享 E.教育行動的實踐 F.教師做為班級領導人)", a: "A", type: "神秘格子"},
            {id: "2M5", q: "【2M5】阿強在課堂大吼，老師壓下『他就是愛鬧事』的成見，嘗試撥開內心的偏頗主見，以開放心靈詢問才發現學生是因為看不清黑板而焦慮。這體現了？\n(A.班級共同遠景的建立 B.師生心智模式的改善 C.自我超越行為的促發 D.師生學習責任的分享 E.教育行動的實踐 F.教師做為班級領導人)", a: "B", type: "神秘格子"},
            {id: "2M6", q: "【2M6】實習老師觀察到，老師不需喝斥，僅憑自身的一言一行與人格特質，就能在潛移默化中重塑學生的觀點、影響學習表現與班級氣度。這體現了？\n(A.班級共同遠景的建立 B.師生心智模式的改善 C.自我超越行為的促發 D.師生學習責任的分享 E.教育行動的實踐 F.教師做為班級領導人)", a: "F", type: "神秘格子"},

            // 3. 意涵－思維偏誤
            {id: "3O1", q: "【3O1】林老師因學生數學滿分，就斷定其英文與操行必佳(1)；主任則因性別偏見而否定學生參加織襪或足球賽的潛能(2)。這兩者分別體現了哪些思維偏誤？\n\n(A.首因效應 B.月暈效應 C.畢馬龍效應 D.霍桑效應 E.刻板印象 F.寬大效應)", a: "B、E", type: "概述"},
            {id: "3M1", q: "【3M1】學生學業表現優異，但老師因看到其在校外穿著隨性、行為豪放，便評斷其『品德操守堪慮』。這體現了老師何種推論偏誤？\n(A.學業成績推論行為 B.外表儀容推論品德 C.過去經驗推論目前行為 D.部分學科推論其他學科 E.家庭結構推估學習狀況)", a: "B", type: "神秘格子"},
            {id: "3M2", q: "【3M2】老師看到學生的家庭背景與手足過去在校的惡名，在尚未與學生互動前，便斷定該生目前行為一定也充滿叛逆。這體現了？\n(A.學業成績推論行為 B.外表儀容推論品德 C.過去經驗推論目前行為 D.部分學科推論其他學科 E.家庭結構推估學習狀況)", a: "C", type: "神秘格子"},
            {id: "3M3", q: "【3M3】面對學生學科表現下滑，老師不看其課堂努力，而是將其歸因為『單親背景、沒人督促』。這種預設性的歸因體現了？\n(A.學業成績推論行為 B.外表儀容推論品德 C.過去經驗推論目前行為 D.部分學科推論其他學科 E.家庭結構推估學習狀況)", a: "E", type: "神秘格子"},
            {id: "3M4", q: "【3M4】老師認為班長既然是全校第一名，在處理班級衝突或人際溝通等德、群育行為上，也必然具備高超的智慧。這體現了？\n(A.學業成績推論行為 B.外表儀容推論品德 C.過去經驗推論目前行為 D.部分學科推論其他學科 E.家庭結構推估學習狀況)", a: "A", type: "神秘格子"},
            {id: "3M5", q: "【3M5】老師認為學生既然在國文、社會等學科拿滿分，下學期的物理與數學邏輯也必然能輕易掌握、無需費心。這體現了？\n(A.學業成績推論行為 B.外表儀容推論品德 C.過去經驗推論目前行為 D.部分學科推論其他學科 E.家庭結構推估學習狀況)", a: "D", type: "神秘格子"},

            // 4. 教師角色
            {id: "4O1", q: "【4O1】【領導的藝術】\n新任主任請教校長領導秘訣。校長指著校計畫說：『首先你要當(1)，精確規劃活動與願景，讓成員有成長空間；當成員遇到困難，你要放下身段當(2)，提供支持與資源；最重要的是，你要成為一位(3)，引導大家改善心智模式、提升問題分析與解決能力。』\n\n請問這三種角色依序為何？\n(答案格式：設計師、僕人、教師)", a: "設計師、僕人、教師", type: "概述"},
            {id: "4M1", q: "【4M1】資深老師面對數位轉型浪潮不退縮，深感『世界變了，不能因害怕就轉頭落跑』，帶頭參與工作坊接受專業轉型的挑戰。這體現了何種教師態度？\n(A.宏觀思考 B.在職進修 C.專業知能 D.虛心胸懷 E.協同合作 F.創新教學 G.求新求變)", a: "G", type: "神秘格子"},
            {id: "4M2", q: "【4M2】老師不再閉門造車，而是主動邀請跨領域老師進教室『觀課共備』，領悟到唯有透過社群的群策群力，才能撐起新課綱的重量。這體現了？\n(A.宏觀思考 B.在職進修 C.專業知能 D.虛心胸懷 E.協同合作 F.創新教學 G.求新求變)", a: "E", type: "神秘格子"},
            {id: "4M3", q: "【4M3】面對學生校外衝突，老師不急著記過，而是走訪鄰里與社工，看見家庭失能與社會結構交織的因果，而非簡化問題。這種視野體現了？\n(A.宏觀思考 B.在職進修 C.專業知能 D.虛心胸懷 E.協同合作 F.創新教學 G.求新求變)", a: "A", type: "神秘格子"},
            {id: "4M4", q: "【4M4】老師展現高超學術素養，能解開最難的物理題，更在學生挫折時以穩定的情緒與嚴謹操守成為定海神針，讓學生發自內心佩服。這體現了？\n(A.宏觀思考 B.在職進修 C.專業知能 D.虛心胸懷 E.協同合作 F.創新教學 G.求新求變)", a: "C", type: "神秘格子"},
            {id: "4M5", q: "【4M5】老師深夜研讀輔導研究，深信教育愛不是口號，必須透過不斷更新知能、精進教學藝術與管理策略，才能給學生最有力的支持。這體現了？\n(A.宏觀思考 B.在職進修 C.專業知能 D.虛心胸懷 E.協同合作 F.創新教學 G.求新求變)", a: "B", type: "神秘格子"},
            {id: "4M6", q: "【4M6】老師結合流行文化與視訊交流，不斷修正策略以點燃學生的求知欲，並依學生個別差異創發趣味活動，開發其潛能。這展現了？\n(A.宏觀思考 B.在職進修 C.專業知能 D.虛心胸懷 E.協同合作 F.創新教學 G.求新求變)", a: "F", type: "神秘格子"},
            {id: "4M7", q: "【4M7】面對曾有前科的轉學生，老師清空心中成見，拒絕讓標籤干擾互動，以平等且開闊的胸襟傾聽對方的生命發表。這展現了？\n(A.宏觀思考 B.在職進修 C.專業知能 D.虛心胸懷 E.協同合作 F.創新教學 G.求新求變)", a: "D", type: "神秘格子"},
            {id: "4S1", q: "【4S1】【全能教師的 24 小時】\n角色清單：1.課程編輯者、2.教學創新者、3.學習導引者、4.資訊給予者、5.問題診斷者、6.活動規畫者、7.溝通促發者、8.教學策略者、9.事件處理者、10.組織營造者、11.能力培養者、12.行政管理者、13.知識催化者、14.行為輔導者、15.行動研究者、16.終生學習者\n\n早上老師(A)排解打架衝突；第一節課(B)拿出自製AI教材，並(C)教導筆記摘要法。午休時(D)分析成績退步原因，隨後(E)在佈告欄佈置溫馨導師牆。下午在課堂(F)激發學生辯論，並(G)視學生反應調整教法進度。放學後(H)整理班費紀錄。\n\n請依序寫出 A->H 對應角色編號（以半形逗號分隔）：", a: "9,2,3,5,10,13,8,12", type: "小節"},
            {id: "4S2", q: "【4S2】【知識管理的層級】\n選項：1.部定課程、2.校定課程、3.知識、4.資訊、5.雜訊、6.智慧、7.資料\n\n林老師分享新課綱經驗：他重視發展(A)跨領域專題；引導學生將混亂的(B)過濾為(C)；再串聯成具邏輯的(D)並轉化為解決問題的(E)；最終達到判斷靈活的(F)境界。這需與(G)國家統一制定的必修課相互配合。\n\n請依序寫出 A->G 的對應數字（以半形逗號分隔）：", a: "2,5,7,4,3,6,1", type: "小節"},

            // 5. 學習取向
            {id: "5O1", q: "【5O1】【觀課教師的隨筆手記】\n選項：1.自主行動、2.課程知識、3.深度處理、4.社會參與、5.學科內容、6.溝通互動\n\n某堂課中，林老師要求學生對議題進行(A)分析而非死背，讓枯燥的(B)轉為內化。小組內展現卓越的(C)傾聽素養，隨後學生自發擬定減塑計畫展現(D)，甚至走入福利社訪談實踐(E)。這讓生硬的(F)在生活中活了起來。\n\n請依序寫出 A->F 對應數字（以半形逗號分隔）：", a: "3,5,6,1,4,2", type: "概述"},
            {id: "5M1", q: "【5M1】小明數學總考個位數，老師卻請他發揮繪畫天賦設計班服，讓他在校慶大放異彩。老師認為不應以單一試卷定生死，應讓學生在不同領域發揮智能。這展現了？\n(A.目標因人而異 B.行為主動積極 C.型態群體合作 D.內容廣泛多元 E.機會無所不在 F.歷程持續不斷 G.評量多元動態 H.方法策略技巧)", a: "G", type: "神秘格子"},

            {id: "5M6", q: "【5M6】老師將剩食問題、球賽失敗等生活瑣事都轉化為教學素材，強調學習的契機在校園各處隨時都在。這展現了學習的？\n(A.目標因人而異 B.行為主動積極 C.型態群體合作 D.內容廣泛多元 E.機會無所不在 F.歷程持續不斷 G.評量多元動態 H.方法策略技巧)", a: "E", type: "神秘格子"},
            {id: "5M7", q: "【5M7】學生參與「城市探索」校外教學。過程中討論核心價值、練習溝通、設計日誌。主要展現了學習內容的哪一項特徵？\n(A.目標因人而異 B.行為主動積極 C.型態群體合作 D.內容廣泛多元 E.機會無所不在 F.歷程持續不斷 G.評量多元動態 H.方法策略技巧)", a: "D", type: "神秘格子"},
            {id: "5M8", q: "【5M8】老師拆散強強聯手的分組，讓擅長美編、資料、口說的學生混編，強調人人發揮所長並以整體合作成果為重。這體現了學習型態應？\n(A.目標因人而異 B.行為主動積極 C.型態群體合作 D.內容廣泛多元 E.機會無所不在 F.歷程持續不斷 G.評量多元動態 H.方法策略技巧)", a: "C", type: "神秘格子"},
            
            // 趣味題
            {id: "40-FUN", q: "【40-FUN】這門課的老師叫什麼名字？（填答格式：XXX老師）", a: "黃筠婷老師", type: "趣味題"}
        ];

        let totalScore = 0;
        let gameData = [];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            gameData = shuffle([...rawData]).map(item => ({ ...item, isPoked: false }));
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            gameData.forEach((item, index) => {
                let box = document.createElement('div');
                box.className = 'poke-item';
                
                if (item.isPoked) {
                    box.innerText = "已戳破";
                    box.classList.add('poked');
                } else {
                    // 根據 type 決定顯示名稱與顏色
                    if (item.type === "概述") {
                        box.innerText = "概述";
                        box.style.backgroundColor = "var(--grid-blue)";
                    } else if (item.type && item.type.includes("小節")) {
                        // 這裡統一顯示為 "小節"，拿掉 -1, -2
                        box.innerText = "小節";
                        box.style.backgroundColor = "var(--grid-green)";
                    } else if (item.type === "趣味題") {
                        box.innerText = "趣味題";
                        box.style.backgroundColor = "var(--grid-pink)";
                    } else {
                        box.innerText = "神秘格子";
                        box.style.backgroundColor = "var(--grid-yellow)";
                    }
                    box.onclick = () => handlePoke(index);
                }
                grid.appendChild(box);
            });
        }

        function handlePoke(index) {
            const item = gameData[index];
            const userAnswer = prompt(`${item.q}`);

            if (userAnswer !== null) {
                if (userAnswer.trim() === item.a) {
                    let scoreAdd = (item.type === "概述" || item.type.includes("小節")) ? 10 : 5;
                    alert(`✅ 正確！編號：${item.id}\n獲得 ${scoreAdd} 分`);
                    totalScore += scoreAdd;
                    gameData[index].isPoked = true;
                    document.getElementById('score').innerText = totalScore;
                    renderGrid(); 
                } else {
                    alert("❌ 答案不太對喔，再試一次！\n(請注意半形逗號或格式是否正確)");
                }
            }
        }

        initGame();
    </script>
